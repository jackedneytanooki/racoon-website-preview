<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Team — Racoon</title>
<link rel="icon" type="image/png" href="assets/racoon-o-gold.png"/>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--midnight:#04122B;--navy:#1F3356;--gold:#FADD75;--paper:#eef2f8;--line:rgba(238,242,248,.14)}
  *{box-sizing:border-box;margin:0}
  body{min-height:100vh;display:grid;place-items:center;background:var(--midnight);color:var(--paper);
    font-family:"Montserrat",system-ui,sans-serif;padding:24px}
  .gate{width:100%;max-width:380px;text-align:center}
  .gate img{height:46px;margin:0 auto 30px;display:block}
  .gate h1{font-family:"Anton",sans-serif;text-transform:uppercase;font-weight:400;letter-spacing:.01em;
    font-size:1.9rem;line-height:1.05;margin-bottom:10px}
  .gate p{color:#9fb2c4;font-size:.95rem;margin-bottom:26px}
  .gate form{display:flex;flex-direction:column;gap:12px}
  .gate input{font-family:"Montserrat";font-size:1rem;color:var(--paper);background:var(--navy);
    border:1px solid var(--line);border-radius:10px;padding:14px 15px;text-align:center}
  .gate input:focus{outline:none;border-color:var(--gold)}
  .gate button{font-family:"JetBrains Mono",monospace;font-size:.78rem;letter-spacing:.06em;
    text-transform:uppercase;font-weight:500;background:var(--gold);color:var(--midnight);border:none;
    border-radius:40px;padding:14px;cursor:pointer;transition:.25s}
  .gate button:hover{background:#fff}
  .gate .err{color:#ff8f7a;font-size:.82rem;min-height:1.1em;font-family:"JetBrains Mono",monospace;letter-spacing:.04em}
</style></head>
<body>
<div class="gate">
  <img src="assets/racoon-wordmark-white.png" alt="Racoon"/>
  <h1>Private preview</h1>
  <p>This site is password protected.</p>
  <form id="f">
    <input id="pw" type="password" placeholder="Enter password" autocomplete="current-password" autofocus/>
    <button type="submit">Unlock</button>
    <div class="err" id="err"></div>
  </form>
</div>

const fromB64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function keyFrom(pw){const b=await crypto.subtle.importKey('raw',E.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:fromB64(D.salt),iterations:D.it,hash:'SHA-256'},b,{name:'AES-GCM',length:256},false,['decrypt']);}
async function tryDecrypt(pw){try{const k=await keyFrom(pw);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(D.iv)},k,fromB64(D.ct));return De.decode(pt);}catch(e){return null;}}
